<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up - FocusPortal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>

                      "error": "#ba1a1a",
                      "inverse-on-surface": "#ebf2f4",
                      "surface-container-lowest": "#ffffff",
                      "background": "#f4fafd",
                      "on-tertiary-fixed": "#2a161c",
                      "surface-container": "#e8eff1",
                      "on-primary-container": "#243222",
                      "surface-variant": "#dde4e6",
                      "inverse-primary": "#bbcbb6",
                      "inverse-surface": "#2b3234",
                      "on-surface-variant": "#444842",
                      "secondary-fixed-dim": "#c6c6c9",
                      "on-primary-fixed": "#111f11",
                      "surface-bright": "#f4fafd",
                      "on-secondary-fixed-variant": "#454749",
                      "on-primary-fixed-variant": "#3c4b3a",
                      "on-tertiary-container": "#3e272e",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#bbcbb6",
                      "outline": "#747871",
                      "primary-container": "#8a9a86",
                      "on-secondary": "#ffffff",
                      "primary-fixed": "#d7e7d1",
                      "on-secondary-container": "#616365",
                      "tertiary": "#73575e",
                      "on-background": "#161d1f",
                      "tertiary-container": "#ad8d95",
                      "surface-tint": "#536251",
                      "on-tertiary-fixed-variant": "#594047",
                      "secondary-fixed": "#e2e2e5",
                      "on-error": "#ffffff",
                      "on-surface": "#161d1f",
                      "surface-dim": "#d4dbdd",
                      "surface-container-low": "#eef5f7"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "8px",
                      "container-padding": "24px",
                      "gutter": "20px",
                      "stack-lg": "48px",
                      "stack-sm": "12px",
                      "stack-md": "24px"
              },
              "fontFamily": {
                      "body-lg": [
                              "Manrope"
                      ],
                      "body-md": [

                      ],
                      "headline-md": [

          },

<style>
        .neumorphic-outset {
            box-shadow: -6px -6px 12px #FFFFFF, 6px 6px 12px #AEAEC0;
        }
        .neumorphic-inset {
            box-shadow: inset -2px -2px 5px #FFFFFF, inset 3px 3px 7px #AEAEC0;
        }
        .neumorphic-button:active {
            box-shadow: inset -2px -2px 5px #FFFFFF, inset 3px 3px 7px #AEAEC0;
            transform: scale(0.98);
        }
      </style>
</head>
<body class="bg-[#F0F0F3] min-h-screen flex items-center justify-center p-4 font-body-md text-on-surface">
<div class="w-full max-w-md bg-[#F0F0F3] rounded-[16px] neumorphic-outset p-container-padding">
<div class="text-center mb-stack-md">
<h1 class="font-headline-lg text-headline-lg text-primary md:font-headline-lg md:text-headline-lg font-headline-lg-mobile text-headline-lg-mobile">Create Account</h1>
<p class="font-body-md text-body-md text-secondary mt-2">Join FocusPortal to manage your goals.</p>
</div>
<form action="#" class="space-y-stack-sm" method="POST">
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-1" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">person</span>
<input class="w-full bg-[#F0F0F3] neumorphic-inset rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary border-none font-body-md text-body-md placeholder-outline-variant transition-shadow" id="fullName" name="fullName" required="" type="text"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-1" for="email">Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">mail</span>
<input class="w-full bg-[#F0F0F3] neumorphic-inset rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary border-none font-body-md text-body-md placeholder-outline-variant transition-shadow" id="email" name="email" required="" type="email"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-1" for="role">Role</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">work</span>
<select class="w-full bg-[#F0F0F3] neumorphic-inset rounded-lg py-3 pl-10 pr-10 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary border-none font-body-md text-body-md appearance-none" id="role" name="role" required="">
<option class="text-outline-variant" disabled="" selected="" value="">Select a role...</option>
<option value="employee">Employee</option>
<option value="manager">Manager</option>
<option value="admin">Admin</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-variation-settings: 'FILL' 0;">expand_more</span>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock</span>
<input class="w-full bg-[#F0F0F3] neumorphic-inset rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary border-none font-body-md text-body-md placeholder-outline-variant transition-shadow" id="password" name="password" required="" type="password"/>
</div>
</div>
<div>
<label class="block font-label-caps text-label-caps text-secondary mb-1" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" style="font-variation-settings: 'FILL' 0;">lock_reset</span>
<input class="w-full bg-[#F0F0F3] neumorphic-inset rounded-lg py-3 pl-10 pr-4 text-on-surface focus:outline-none focus:ring-1 focus:ring-primary border-none font-body-md text-body-md placeholder-outline-variant transition-shadow" id="confirmPassword" name="confirmPassword" required="" type="password"/>
</div>
</div>
<div class="pt-stack-sm">
<button class="w-full bg-primary text-on-primary font-headline-md text-headline-md py-3 rounded-lg neumorphic-outset neumorphic-button transition-all duration-200 flex justify-center items-center gap-2" type="submit">
<span>Sign Up</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-stack-md text-center">
<a class="font-body-md text-body-md text-secondary hover:text-primary transition-colors" href="#">
                Already have an account? <span class="font-bold">Log in</span>
</a>
</div>
</div>
</body></html>
