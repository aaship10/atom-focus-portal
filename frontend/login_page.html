<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FocusPortal - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "surface-container-high": "#e2e9ec",
                      "on-secondary-fixed": "#1a1c1e",
                      "on-error-container": "#93000a",
                      "primary": "#536251",
                      "error-container": "#ffdad6",
                      "tertiary-fixed-dim": "#e1bec6",
                      "tertiary-fixed": "#fed9e2",
                      "surface-container-highest": "#dde4e6",
                      "surface": "#f4fafd",
                      "secondary": "#5d5e61",
                      "secondary-container": "#dfdfe2",
                      "on-tertiary": "#ffffff",
                      "outline-variant": "#c4c8bf",
                      "error": "#ba1a1a",
                      "inverse-on-surface": "#ebf2f4",
                      "surface-container-lowest": "#ffffff",
                      "background": "#f4fafd",
                      "on-tertiary-fixed": "#2a161c",
                      "surface-container": "#e8eff1",
                      "on-primary-container": "#243222",
                      "surface-variant": "#dde4e6",
                      "inverse-primary": "#bbcbb6",
                      "inverse-surface": "#2b3234",
                      "on-surface-variant": "#444842",
                      "secondary-fixed-dim": "#c6c6c9",
                      "on-primary-fixed": "#111f11",
                      "surface-bright": "#f4fafd",
                      "on-secondary-fixed-variant": "#454749",
                      "on-primary-fixed-variant": "#3c4b3a",
                      "on-tertiary-container": "#3e272e",
                      "on-primary": "#ffffff",
                      "primary-fixed-dim": "#bbcbb6",
                      "outline": "#747871",
                      "primary-container": "#8a9a86",
                      "on-secondary": "#ffffff",
                      "primary-fixed": "#d7e7d1",
                      "on-secondary-container": "#616365",
                      "tertiary": "#73575e",
                      "on-background": "#161d1f",
                      "tertiary-container": "#ad8d95",
                      "surface-tint": "#536251",
                      "on-tertiary-fixed-variant": "#594047",
                      "secondary-fixed": "#e2e2e5",
                      "on-error": "#ffffff",
                      "on-surface": "#161d1f",
                      "surface-dim": "#d4dbdd",
                      "surface-container-low": "#eef5f7"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "base": "8px",
                      "container-padding": "24px",
                      "gutter": "20px",
                      "stack-lg": "48px",
                      "stack-sm": "12px",
                      "stack-md": "24px"
              },
              "fontFamily": {
                      "body-lg": [
                              "Manrope"
                      ],
                      "body-md": [
                              "Manrope"
                      ],
                      "headline-md": [
                              "Manrope"
                      ],
                      "label-caps": [
                              "JetBrains Mono"
                      ],
                      "headline-lg-mobile": [
                              "Manrope"
                      ],
                      "headline-lg": [
                              "Manrope"
                      ]
              },
              "fontSize": {
                      "body-lg": [
                              "16px",
                              {
                                      "lineHeight": "24px",
                                      "fontWeight": "400"
                              }
                      ],
                      "body-md": [
                              "14px",
                              {
                                      "lineHeight": "20px",
                                      "fontWeight": "400"
                              }
                      ],
                      "headline-md": [
                              "20px",
                              {
                                      "lineHeight": "28px",
                                      "fontWeight": "600"
                              }
                      ],
                      "label-caps": [
                              "12px",
                              {
                                      "lineHeight": "16px",
                                      "letterSpacing": "0.05em",
                                      "fontWeight": "500"
                              }
                      ],
                      "headline-lg-mobile": [
                              "24px",
                              {
                                      "lineHeight": "32px",
                                      "letterSpacing": "-0.01em",
                                      "fontWeight": "700"
                              }
                      ],
                      "headline-lg": [
                              "32px",
                              {
                                      "lineHeight": "40px",
                                      "letterSpacing": "-0.02em",
                                      "fontWeight": "700"
                              }
                      ]
              }
      },
          },
        }
      </script>
</head>
<body class="bg-[#F0F0F3] text-on-surface font-body-md min-h-screen flex items-center justify-center p-4">
<!-- Canvas -->
<main class="w-full max-w-md">
<!-- Extruded Card -->
<div class="bg-[#F0F0F3] rounded-2xl p-8 shadow-[-6px_-6px_12px_#FFFFFF,6px_6px_12px_#AEAEC0] flex flex-col gap-8 items-center">
<!-- Header -->
<div class="text-center space-y-2">
<h1 class="font-headline-lg text-headline-lg md:font-headline-lg md:text-headline-lg text-primary tracking-tight">Portal Login</h1>
<p class="font-body-md text-body-md text-secondary">Access your personalized workspace.</p>
</div>
<!-- Form -->
<form class="w-full flex flex-col gap-6">
<!-- Email Field (Pressed) -->
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant ml-2" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">mail</span>
<input class="w-full bg-[#F0F0F3] text-on-surface font-body-lg text-body-lg rounded-xl py-3 pl-12 pr-4 border-none shadow-[inset_3px_3px_7px_#AEAEC0,inset_-2px_-2px_5px_#FFFFFF] focus:ring-2 focus:ring-primary focus:outline-none transition-shadow placeholder:text-outline-variant" id="email" name="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field (Pressed) -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center ml-2 mr-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Password</label>
<a class="font-label-caps text-label-caps text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-secondary pointer-events-none">lock</span>
<input class="w-full bg-[#F0F0F3] text-on-surface font-body-lg text-body-lg rounded-xl py-3 pl-12 pr-4 border-none shadow-[inset_3px_3px_7px_#AEAEC0,inset_-2px_-2px_5px_#FFFFFF] focus:ring-2 focus:ring-primary focus:outline-none transition-shadow placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Action Button (Extruded to Pressed on Active) -->
<button class="mt-2 w-full bg-primary text-on-primary font-headline-md text-headline-md py-4 rounded-xl shadow-[-6px_-6px_12px_#FFFFFF,6px_6px_12px_#AEAEC0] hover:bg-primary-container active:shadow-[inset_3px_3px_7px_#444842,inset_-2px_-2px_5px_#8A9A86] transition-all duration-200 flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[20px]">login</span>
</button>
</form>
<!-- Footer Link -->
<p class="font-body-md text-body-md text-secondary text-center">
                Don't have an account? <a class="text-primary font-bold hover:text-primary-container transition-colors" href="#">Sign up</a>
</p>
</div>
</main>
</body></html>
