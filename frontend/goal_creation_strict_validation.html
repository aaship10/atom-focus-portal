<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FocusPortal - Create Goal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&amp;family=Manrope:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#8a9a86",
                        "on-primary-fixed": "#111f11",
                        "tertiary": "#73575e",
                        "on-primary-fixed-variant": "#3c4b3a",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "secondary": "#5d5e61",
                        "surface-dim": "#d4dbdd",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed": "#2a161c",
                        "surface-tint": "#536251",
                        "background": "#f4fafd",
                        "surface": "#f4fafd",
                        "outline": "#747871",
                        "surface-container-low": "#eef5f7",
                        "surface-container": "#e8eff1",
                        "primary-fixed-dim": "#bbcbb6",
                        "on-primary-container": "#243222",
                        "surface-bright": "#f4fafd",
                        "secondary-container": "#dfdfe2",
                        "tertiary-fixed-dim": "#e1bec6",
                        "secondary-fixed-dim": "#c6c6c9",
                        "on-tertiary-fixed-variant": "#594047",
                        "surface-container-highest": "#dde4e6",
                        "outline-variant": "#c4c8bf",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#444842",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#d7e7d1",
                        "surface-variant": "#dde4e6",
                        "tertiary-fixed": "#fed9e2",
                        "primary": "#536251",
                        "on-surface": "#161d1f",
                        "tertiary-container": "#ad8d95",
                        "surface-container-high": "#e2e9ec",
                        "on-background": "#161d1f",
                        "inverse-surface": "#2b3234",
                        "on-tertiary-container": "#3e272e",
                        "on-secondary-container": "#616365",
                        "secondary-fixed": "#e2e2e5",
                        "error-container": "#ffdad6",
                        "on-secondary-fixed": "#1a1c1e",
                        "inverse-primary": "#bbcbb6",
                        "on-error": "#ffffff",
                        "inverse-on-surface": "#ebf2f4",
                        "on-secondary-fixed-variant": "#454749"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-md": "24px",
                        "base": "8px",
                        "container-padding": "24px",
                        "gutter": "20px",
                        "stack-sm": "12px",
                        "stack-lg": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Manrope"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"],
                        "body-lg": ["Manrope"],
                        "headline-lg": ["Manrope"]
                    },
                    "fontSize": {
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface text-on-surface font-body-md antialiased min-h-screen">
<!-- Suppressed App Shell Navigations for Transactional Context -->
<main class="max-w-[800px] mx-auto pt-12 px-gutter pb-24">
<!-- Header Section -->
<header class="flex items-center gap-4 mb-stack-md">
<button aria-label="Go back" class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:text-primary shadow-[-2px_-2px_5px_#FFFFFF,2px_2px_5px_#AEAEC0] active:shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] transition-all">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Phase 2: Goal Creation</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Define actionable metrics for your focus area.</p>
</div>
</header>
<!-- Validation Widget -->
<div class="flex flex-wrap gap-6 mb-stack-lg p-6 bg-surface rounded-xl shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-surface shadow-[-2px_-2px_5px_#FFFFFF,2px_2px_5px_#AEAEC0] flex items-center justify-center text-primary">
<span class="material-symbols-outlined text-[18px]" data-icon="flag">flag</span>
</div>
<div>
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Capacity</p>
<p class="font-headline-md text-headline-md text-on-surface">Goal 4 of 8 max</p>
</div>
</div>
<div class="h-10 w-px bg-surface-variant hidden sm:block"></div>
<div class="flex-1 min-w-[200px]">
<div class="flex justify-between items-end mb-2">
<p class="font-label-caps text-label-caps text-on-surface-variant uppercase">Total Weight Allocation</p>
<p class="font-headline-md text-headline-md text-primary">85%</p>
</div>
<div class="h-2 w-full rounded-full bg-surface shadow-[inset_-1px_-1px_3px_#FFFFFF,inset_2px_2px_4px_#AEAEC0] overflow-hidden">
<div class="h-full bg-primary w-[85%] rounded-full shadow-[-1px_-1px_2px_rgba(255,255,255,0.5),1px_1px_2px_rgba(0,0,0,0.1)]"></div>
</div>
</div>
</div>
<!-- Main Form Container (Outset) -->
<form class="bg-surface shadow-[-6px_-6px_12px_#FFFFFF,6px_6px_12px_#AEAEC0] rounded-[16px] p-container-padding sm:p-8">
<div class="flex flex-col gap-stack-md">
<!-- Thrust Area -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-base ml-1">Thrust Area</label>
<div class="relative">
<select class="w-full appearance-none bg-surface text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 border-none outline-none shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow">
<option disabled="" selected="" value="">Select an area</option>
<option value="sales">Sales</option>
<option value="innovation">Innovation</option>
<option value="operations">Operations</option>
<option value="customer_success">Customer Success</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Title -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-base ml-1">Title</label>
<input class="w-full bg-surface text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 border-none outline-none shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow placeholder:text-outline-variant" placeholder="e.g., Increase Q3 Recurring Revenue" type="text"/>
</div>
<!-- Description -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-base ml-1">Description</label>
<textarea class="w-full bg-surface text-on-surface font-body-md text-body-md rounded-lg px-4 py-3 border-none outline-none shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow resize-none placeholder:text-outline-variant" placeholder="Provide context or specific initiatives..." rows="3"></textarea>
</div>
<!-- Metrics Row -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-stack-md">
<!-- UoM -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-base ml-1">Unit of Measure (UoM)</label>
<div class="relative">
<select class="w-full appearance-none bg-surface text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 border-none outline-none shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow">
<option value="numeric">Numeric</option>
<option value="percent">%</option>
<option value="timeline">Timeline</option>
<option value="zero">Zero</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Target -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-base ml-1">Target</label>
<input class="w-full bg-surface text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 border-none outline-none shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] focus:ring-2 focus:ring-primary focus:ring-opacity-50 transition-shadow placeholder:text-outline-variant" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Weight -->
<div class="w-full sm:w-1/2 pr-0 sm:pr-3">
<label class="block font-label-caps text-label-caps text-on-surface-variant uppercase mb-base ml-1">Weight (%)</label>
<div class="relative">
<input class="w-full bg-surface text-on-surface font-body-lg text-body-lg rounded-lg px-4 py-3 border-none outline-none shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] focus:ring-2 focus:ring-error focus:ring-opacity-50 transition-shadow text-error" type="number" value="5"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-error pointer-events-none" data-icon="error">error</span>
</div>
<p class="font-body-md text-body-md text-error mt-2 flex items-center gap-1 ml-1">
<span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
                        Rule 1: Weight must be at least 10%.
                    </p>
</div>
</div>
<!-- Divider -->
<div class="h-px w-full bg-surface shadow-[inset_0px_1px_2px_#AEAEC0] my-stack-md mt-10"></div>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-4">
<button class="px-6 py-3 font-label-caps text-label-caps uppercase text-on-surface-variant rounded-lg hover:shadow-[-2px_-2px_5px_#FFFFFF,2px_2px_5px_#AEAEC0] active:shadow-[inset_-2px_-2px_5px_#FFFFFF,inset_3px_3px_7px_#AEAEC0] transition-all" type="button">
                    Cancel
                </button>
<!-- Disabled State Neumorphic Button -->
<button class="px-8 py-3 font-label-caps text-label-caps uppercase rounded-lg bg-surface text-outline-variant cursor-not-allowed shadow-[inset_-1px_-1px_2px_#FFFFFF,inset_1px_1px_2px_#AEAEC0] opacity-70 flex items-center gap-2" disabled="" type="button">
<span class="material-symbols-outlined text-[18px]" data-icon="save">save</span>
                    Save Goal
                </button>
</div>
</form>
</main>
</body></html>
